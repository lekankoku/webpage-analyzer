services:
  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    healthcheck:
      test:
        ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8080/openapi.yaml"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://server:8080
    depends_on:
      server:
        condition: service_healthy
